services:
  litetrack:
    image: ghcr.io/xgenya/litetrack:latest
    pull_policy: always
    container_name: litetrack
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # SQLite database — persisted on host
      - ./data:/app/data
    env_file:
      # Copy .env.example to .env and edit before starting
      - .env
    environment:
      - NODE_ENV=production
